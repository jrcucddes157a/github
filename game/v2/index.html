<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Normalize CSS-->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Jersey+10&display=swap" rel="stylesheet">
    <!-- Personal CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Javascript -->
    <script src="scripts.js" defer></script>
    <title>戦闘の時</title>
</head>

<body>
    <header>
        <h1>戦闘の時</h1>
    </header>
    <main>
        <section id="howto">
            <div id="howtobuttons">
                <button class="start">START</button>
                <button class="quit">BACK TO TITLE</button>
            </div>
        </section>

        <section id="play">
            <div id="battleheader">
                <button id="mute">MUTE ALL SOUND</button>
                <button id="howtoplay">HOW TO PLAY</button>
                <button id="restart">RESTART</button>
            </div>

            <div class="healthbar" id="health1">
                <div id="p1healthbarcontainer">
                    <div id="p1health"></div>
                </div>
                <p>PLAYER 1 HP: <span id="p1hpnum"></span></p>
            </div>

            <div class="healthbar" id="health2">
                <div id="p2healthbarcontainer">
                    <div id="p2health"></div>
                </div>
                <p>PLAYER 2 HP: <span id="p2hpnum"></span></p>
            </div>

            <div id="buttons">
                <div id="offense">
                    <div id="rollcontainer">
                        <div id="rollbarbox">
                            <div id="rollbarcontainer">
                                <div id="rollbar"></div>
                            </div>
                        </div>
                        <button id="roll">ROLL</button>
                    </div>
                    <button id="attack">ATTACK</button>
                </div>

                <div id="defense">
                    <button id="heal">HEAL</button>
                    <div id="dots">
                        <div class="dot"></div>
                        <div class="dot"></div>
                        <div class="dot"></div>
                    </div>
                </div>

                <button id="usecard">USE CARD</button>
            </div>

            <div id="p1dice"></div>
            <div id="p2dice"></div>

            <div id="cards">
                <div id="p1card">
                    <img src="images/cardback.png" alt="back of card" id="p1back">
                    <img src="" alt="" id="p1front">
                </div>

                <div id="p2card">
                    <img src="images/cardback.png" alt="" id="p2back">
                    <img src="" alt="" id="p2front">
                </div>
            </div>

            <p id="failure">OVERBURST FAILED!</p>

            <div id="players">
                <div id="player1">
                    <p id="p1text">PLAYER 1</p>
                    <img src="" alt="" id="p1sprite">
                </div>

                <div id="player2">
                    <p id="p2text">PLAYER 2</p>
                    <img src="" alt="" id="p2sprite">
                </div>
            </div>
        </section>

        <section id="p1win"></section>

        <section id="p2win"></section>
    </main>
    <footer>
        made by jordan crooks.
    </footer>
</body>

</html>
